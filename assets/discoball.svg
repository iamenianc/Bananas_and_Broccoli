<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <defs>
    <!-- spherical base: bright top-left, dark lower-right -->
    <radialGradient id="sphere" cx="38%" cy="32%" r="78%">
      <stop offset="0%"   stop-color="#eaf7ff"/>
      <stop offset="45%"  stop-color="#8fc4ee"/>
      <stop offset="78%"  stop-color="#4a79ad"/>
      <stop offset="100%" stop-color="#22406a"/>
    </radialGradient>
    <!-- edge shading to round the sphere -->
    <radialGradient id="shade" cx="38%" cy="32%" r="80%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="68%"  stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0b1830" stop-opacity="0.6"/>
    </radialGradient>
    <!-- mirror-tile grid: dark grout with a bright facet inset -->
    <pattern id="tiles" width="11" height="11" patternUnits="userSpaceOnUse">
      <rect width="11" height="11" fill="#15243c"/>
      <rect x="0.9" y="0.9" width="9.2" height="9.2" rx="1" fill="#cfeaff"/>
    </pattern>
    <clipPath id="ball"><circle cx="50" cy="50" r="46"/></clipPath>
  </defs>

  <g clip-path="url(#ball)">
    <circle cx="50" cy="50" r="46" fill="url(#sphere)"/>
    <rect x="3" y="3" width="94" height="94" fill="url(#tiles)" opacity="0.55"/>
    <rect x="3" y="3" width="94" height="94" fill="url(#shade)"/>
    <!-- a few permanently-bright facets catching the light -->
    <rect x="29" y="23" width="9.2" height="9.2" rx="1" fill="#ffffff" opacity="0.92"/>
    <rect x="40" y="29" width="9.2" height="9.2" rx="1" fill="#ffffff" opacity="0.7"/>
    <rect x="22" y="34" width="9.2" height="9.2" rx="1" fill="#ffffff" opacity="0.6"/>
  </g>

  <circle cx="50" cy="50" r="46" fill="none" stroke="#16263d" stroke-width="2"/>
</svg>
